version: '3.9'
services:
  app:
    build: .
    container_name: crm-app
    ports:
      - '5000:5000'
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run dev

  mongodb:
    image: mongo:7
    container_name: crm-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
